apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: rag-platform
  labels:
    app: rag-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: rag-platform/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          env:
            - name: QDRANT_HOST
              value: "rag-qdrant"
            - name: OPENSEARCH_HOST
              value: "rag-opensearch"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rag-backend
  namespace: rag-platform
spec:
  selector:
    app: rag-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
