apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: rag-platform
  labels:
    app: rag-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-worker
  template:
    metadata:
      labels:
        app: rag-worker
    spec:
      containers:
        - name: worker
          image: rag-platform/backend:latest
          command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
